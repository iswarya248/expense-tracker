version: '3.8'

services:
  # ── PostgreSQL Database ──────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: expense_tracker_db
    environment:
      POSTGRES_DB: expense_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/config/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Backend API ──────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: expense_tracker_api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 5000
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres123@postgres:5432/expense_tracker
      JWT_SECRET: your_super_secret_jwt_key_docker
      JWT_EXPIRES_IN: 7d
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      AI_PROVIDER: anthropic
      AI_MODEL: claude-sonnet-4-20250514
      FRONTEND_URL: https://expense-tracker-sigma-beige.vercel.app
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules

  # ── Frontend ─────────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: expense_tracker_ui
    depends_on:
      - backend
    environment:
      REACT_APP_API_URL: https://expense-tracker-ai-l9b7.onrender.com/api
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
